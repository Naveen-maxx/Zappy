<body>
  <!-- Temporary Debug Script -->
  <script>
    window.addEventListener('error', function (event) {
      document.body.innerHTML = '<div style="background:red;color:white;padding:20px;font-family:monospace;"><h1>Runtime Error</h1><pre>' + event.message + '\n' + event.filename + ':' + event.lineno + '</pre></div>';
    });
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML = '<div style="background:red;color:white;padding:20px;font-family:monospace;"><h1>Unhandled Rejection</h1><pre>' + event.reason + '</pre></div>';
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
